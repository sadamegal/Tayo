name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  tests:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php: ['8.1', '8.2', '8.3', '8.4']
        laravel: ['10.*', '11.*', '12.*']
        livewire: ['3.*', '4.*']
        stability: [prefer-stable]
        exclude:
          # Laravel 10 requires Testbench 8 which doesn't support PHP 8.4
          - laravel: '10.*'
            php: '8.4'
          # Livewire 4 requires Laravel 11+
          - livewire: '4.*'
            laravel: '10.*'

        include:
          - laravel: '10.*'
            testbench: '8.*'
          - laravel: '11.*'
            testbench: '9.*'
          - laravel: '12.*'
            testbench: '10.*'

    name: PHP ${{ matrix.php }} — Laravel ${{ matrix.laravel }} — Livewire ${{ matrix.livewire }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: dom, curl, libxml, mbstring, zip
          coverage: none

      - name: Install dependencies
        run: |
          composer require \
            "laravel/framework:${{ matrix.laravel }}" \
            "livewire/livewire:${{ matrix.livewire }}" \
            "orchestra/testbench:${{ matrix.testbench }}" \
            --no-interaction \
            --no-update
          composer update \
            --${{ matrix.stability }} \
            --prefer-dist \
            --no-interaction \
            --no-progress

      - name: Run tests
        run: ./vendor/bin/phpunit
